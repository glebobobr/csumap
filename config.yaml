server:
  address: ":8080"
  read_timeout: "15s"
  write_timeout: "30s"
  idle_timeout: "60s"
  shutdown_timeout: "10s"

database:
  dsn: "postgres://postgres:postgres@localhost:5432/csumap"
  max_conns: 25
  min_conns: 5
  max_conn_lifetime: "1h"
  max_conn_idle_time: "30m"

redis:
  address: "localhost:6379"
  password: ""
  db: 0
  pool_size: 10

jwt:
  secret: "change-me-in-production"
  access_token_ttl: "15m"

log:
  level: "info"
  development: false